apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: noobaa-mgmt-service-monitor
  labels:
    app: noobaa
spec:
  endpoints:
  - port: mgmt-https
    path: /metrics/web_server
    scheme: https
  - port: mgmt-https
    path: /metrics/bg_workers
    scheme: https
  - port: mgmt-https
    path: /metrics/hosted_agents
    scheme: https
  namespaceSelector: {}
  selector:
    matchLabels:
      noobaa-mgmt-svc: "true"
