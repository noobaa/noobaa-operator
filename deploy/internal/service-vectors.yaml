apiVersion: v1
kind: Service
metadata:
  name: vectors
  labels:
    app: noobaa
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: 'noobaa-vectors-serving-cert'
    service.alpha.openshift.io/serving-cert-secret-name: 'noobaa-vectors-serving-cert'
spec:
  type: LoadBalancer
  selector:
    noobaa-s3: SYSNAME
  ports:
    - port: 443
      targetPort: 14443
      name: vectors-https

